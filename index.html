<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÃNA Presentes - Brindes e Personalizados</title>
    
    <!-- Bibliotecas Essenciais -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
    
    <!-- Ícones Estáveis (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Firebase SDK (Para Banco de Dados em Nuvem) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f9fafb; margin: 0; }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // CONFIGURAÇÃO DO BANCO DE DADOS (FIREBASE)
        // ==========================================
        
        const isCanvas = typeof __firebase_config !== 'undefined';
        
        // SUAS CHAVES DO FIREBASE CONFIGURADAS:
        const manualFirebaseConfig = {
            apiKey: "AIzaSyDk_YEExfM3cA6KM-Ae2O9SgQ66XacIqYM",
            authDomain: "nana-presentes-loja-af75c.firebaseapp.com",
            projectId: "nana-presentes-loja-af75c",
            storageBucket: "nana-presentes-loja-af75c.firebasestorage.app",
            messagingSenderId: "470415105525",
            appId: "1:470415105525:web:92d0862fcab252ccf594bc"
        };

        let app, auth, db, appId;
        let firebaseAtivo = false;

        try {
            if (isCanvas) {
                app = firebase.initializeApp(JSON.parse(__firebase_config));
                appId = typeof __app_id !== 'undefined' ? __app_id : 'nana-store';
                firebaseAtivo = true;
            } else if (manualFirebaseConfig.apiKey !== "COLE_SUA_API_KEY_AQUI") {
                app = firebase.initializeApp(manualFirebaseConfig);
                appId = manualFirebaseConfig.projectId;
                firebaseAtivo = true;
            }
            if (firebaseAtivo) {
                auth = firebase.auth();
                db = firebase.firestore();
            }
        } catch (error) {
            console.error("Erro ao inicializar Firebase:", error);
        }

        const { useState, useEffect } = React;

        // Componente de Ícone
        const Icon = ({ name, size = 24, className = "" }) => {
            const getPhClass = (iconName) => {
                const map = {
                    Settings: 'ph-gear', ShoppingBag: 'ph-shopping-bag', ShoppingCart: 'ph-shopping-cart',
                    Search: 'ph-magnifying-glass', Menu: 'ph-list', Save: 'ph-floppy-disk', ImageIcon: 'ph-image',
                    Box: 'ph-package', Palette: 'ph-palette', Plus: 'ph-plus', Trash2: 'ph-trash', Store: 'ph-storefront',
                    Lock: 'ph-lock', X: 'ph-x', Upload: 'ph-upload-simple', ArrowLeft: 'ph-arrow-left',
                    Minus: 'ph-minus', Check: 'ph-check', MessageCircle: 'ph-chat-circle', MapPin: 'ph-map-pin',
                    Instagram: 'ph-instagram-logo'
                };
                return map[iconName] || 'ph-circle';
            };
            return <i className={`ph ${getPhClass(name)} ${className}`} style={{ fontSize: size }}></i>;
        };

        // Dados base caso a nuvem esteja vazia
        const defaultData = {
            theme: {
                storeName: "NÃNA Presentes", 
                logo: "", 
                announcementBar: "FRETE GRÁTIS PARA COMPRAS ACIMA DE R$ 150,00",
                primaryColor: "#ec4899",
                whatsapp: "5511932086207",
                instagram: "_nanapresentes" 
            },
            banners: [
                { id: 1, url: "https://images.unsplash.com/photo-1513201099705-a9746e1e201f?auto=format&fit=crop&w=1600&q=80", title: "Presentes Inesquecíveis" }
            ],
            products: [
                { 
                    id: 1, 
                    title: "Caneca Personalizada Porcelana Branca 325ml", 
                    price: "35.90", 
                    oldPrice: "45.00", 
                    category: "Canecas", 
                    images: ["https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?auto=format&fit=crop&w=800&q=80"],
                    description: "Caneca de porcelana de alta qualidade com acabamento impecável.",
                    variants: { colors: ["Branco"], sizes: ["325ml"] }
                }
            ]
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [storeData, setStoreData] = useState(defaultData);
            
            const [viewMode, setViewMode] = useState('store'); 
            const [selectedProductId, setSelectedProductId] = useState(null);
            const [adminTab, setAdminTab] = useState('theme'); 
            const [cartItems, setCartItems] = useState([]);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);

            // 1. Autenticar no Banco de Dados
            useEffect(() => {
                if (!firebaseAtivo) {
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Erro na autenticação:", err);
                        setLoading(false);
                    }
                };
                
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            // 2. Buscar Dados em Tempo Real (Sincronização para todos)
            useEffect(() => {
                if (!user || !firebaseAtivo) return;

                const storeRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('storeConfig').doc('main');
                
                const unsubscribe = storeRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        setStoreData(docSnap.data());
                    } else {
                        // Se for a primeira vez, salva os dados padrão na nuvem
                        storeRef.set(defaultData).catch(e => console.error(e));
                    }
                    setLoading(false);
                }, (error) => {
                    console.error("Erro ao buscar dados:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // Função para salvar as edições
            const saveToCloud = async (newData) => {
                setStoreData(newData); // Atualiza na tela imediatamente
                if (firebaseAtivo && user) {
                    try {
                        const storeRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('storeConfig').doc('main');
                        await storeRef.set(newData);
                        alert("Salvo com sucesso na nuvem! Todos os clientes já veem a atualização.");
                    } catch (err) {
                        console.error("Erro ao salvar:", err);
                        alert("Erro de permissão ao salvar na nuvem.");
                    }
                } else {
                    alert("Aviso: Banco de dados não configurado. Alterações não foram salvas na internet.");
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === '160330') {
                    setIsLoggedIn(true);
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            const addToCart = (product, qty, note) => {
                const newItem = {
                    cartId: Date.now(),
                    id: product.id,
                    title: product.title,
                    price: product.price,
                    image: product.images[0],
                    qty: qty,
                    note: note
                };
                setCartItems([...cartItems, newItem]);
                setViewMode('cart');
                window.scrollTo(0,0);
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-12 h-12 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin mb-4"></div>
                    <p className="text-xs font-black text-gray-400 uppercase tracking-widest">Carregando NÃNA...</p>
                </div>
            );

            if (!firebaseAtivo && !isCanvas) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-6 text-center">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-lg border-2 border-red-100">
                            <Icon name="Lock" size={48} className="text-red-500 mx-auto mb-4" />
                            <h2 className="text-2xl font-black text-gray-900 mb-4 uppercase">Banco de Dados Ausente</h2>
                            <p className="text-gray-600 mb-6">Para usar este site no Netlify, você precisa configurar as chaves do Firebase no código.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <div className="bg-gray-900 text-white p-2 flex justify-between items-center px-4 sticky top-0 z-[60]">
                        <div className="flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span className="text-[10px] font-bold uppercase tracking-widest opacity-60">NÃNA ONLINE</span>
                        </div>
                        <button onClick={() => viewMode === 'admin' ? setViewMode('store') : setViewMode('admin')} className="text-[10px] font-black bg-white/10 px-3 py-1 rounded-lg hover:bg-white/20 uppercase transition-all">
                            {viewMode === 'admin' ? 'Ver Site' : 'Painel Admin'}
                        </button>
                    </div>

                    <div className="flex-grow">
                        {viewMode === 'store' && (
                            <StoreFront 
                                data={storeData} 
                                onProductClick={(id) => { setSelectedProductId(id); setViewMode('product-detail'); window.scrollTo(0,0); }} 
                                cartCount={cartItems.length} 
                                onOpenCart={() => setViewMode('cart')} 
                            />
                        )}

                        {viewMode === 'product-detail' && (
                            <ProductDetail 
                                product={storeData.products.find(p => p.id === selectedProductId)} 
                                theme={storeData.theme} 
                                onBack={() => setViewMode('store')}
                                onAddToCart={addToCart}
                            />
                        )}

                        {viewMode === 'cart' && (
                            <CartView 
                                items={cartItems} 
                                theme={storeData.theme} 
                                onRemove={(id) => setCartItems(cartItems.filter(item => item.cartId !== id))} 
                                onContinue={() => setViewMode('store')} 
                            />
                        )}

                        {viewMode === 'admin' && (
                            !isLoggedIn ? (
                                <div className="flex items-center justify-center min-h-[80vh] p-6 fade-in">
                                    <form onSubmit={handleLogin} className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border border-gray-100">
                                        <div className="bg-pink-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-8 text-pink-500"><Icon name="Lock" size={32} /></div>
                                        <h2 className="text-2xl font-black mb-2 uppercase tracking-tighter text-gray-800">Painel NÃNA</h2>
                                        <p className="text-gray-400 text-sm mb-10">Acesso restrito para edição da loja</p>
                                        <input type="password" placeholder="Senha mestra" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className={`w-full p-5 bg-gray-50 border-2 ${loginError ? 'border-red-500 animate-shake' : 'border-gray-100'} rounded-2xl outline-none mb-6 text-center text-xl font-black transition-all`} />
                                        <button className="w-full text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl transition-all" style={{backgroundColor: storeData.theme.primaryColor}}>Acessar Agora</button>
                                    </form>
                                </div>
                            ) : (
                                <AdminPanel 
                                    data={storeData} 
                                    setData={saveToCloud} 
                                    activeTab={adminTab} 
                                    setActiveTab={setAdminTab} 
                                    onSave={() => setViewMode('store')} 
                                />
                            )
                        )}
                    </div>
                </div>
            );
        }

        // --- COMPONENTES DA VITRINE ---

        function BannerCarousel({ banners }) {
            const [current, setCurrent] = useState(0);
            useEffect(() => {
                if (banners.length <= 1) return;
                const timer = setInterval(() => setCurrent(p => (p + 1) % banners.length), 5000);
                return () => clearInterval(timer);
            }, [banners.length]);
            if (!banners || banners.length === 0) return null;
            return (
                <section className="relative w-full h-64 md:h-[500px] overflow-hidden bg-gray-100">
                    {banners.map((b, i) => (
                        <div key={b.id} className={`absolute inset-0 transition-opacity duration-1000 ${i === current ? 'opacity-100' : 'opacity-0'}`}>
                            <img src={b.url} className="w-full h-full object-cover" alt="Banner" />
                            <div className="absolute inset-0 bg-black/10 flex items-center justify-center"><h2 className="text-white text-3xl md:text-6xl font-black tracking-tighter drop-shadow-2xl uppercase text-center px-4">{b.title}</h2></div>
                        </div>
                    ))}
                </section>
            );
        }

        function StoreFront({ data, onProductClick, cartCount, onOpenCart }) {
            return (
                <div className="fade-in">
                    <div className="text-white text-center py-2 text-[10px] font-black tracking-[0.2em] uppercase" style={{ backgroundColor: data.theme.primaryColor }}>{data.theme.announcementBar}</div>
                    <header className="border-b border-gray-100 sticky top-[34px] bg-white/95 backdrop-blur-md z-50">
                        <div className="container mx-auto px-4 py-3 md:py-4 flex justify-between items-center relative">
                            {/* Logo - Lado Esquerdo */}
                            <div className="flex-1 flex justify-start items-center z-10">
                                {data.theme.logo ? (
                                    <img src={data.theme.logo} className="h-12 sm:h-16 md:h-20 w-auto object-contain" alt="Logo NÃNA" />
                                ) : (
                                    <div className="text-2xl md:text-3xl font-black tracking-tighter" style={{color: data.theme.primaryColor}}>{data.theme.storeName || 'NÃNA'}</div>
                                )}
                            </div>
                            
                            {/* Texto Centralizado */}
                            <div className="absolute left-1/2 transform -translate-x-1/2 w-[65%] sm:w-auto text-center pointer-events-none z-0">
                                <h1 className="text-[10px] sm:text-xs md:text-sm lg:text-base font-black tracking-[0.15em] md:tracking-widest uppercase text-gray-500 leading-tight">
                                    BRINDES E PRESENTES<br className="sm:hidden" /> PERSONALIZADOS
                                </h1>
                            </div>

                            {/* Ícones - Lado Direito */}
                            <div className="flex-1 flex items-center justify-end gap-4 md:gap-6 text-gray-400 z-10">
                                <a href={`https://www.instagram.com/${data.theme.instagram}`} target="_blank" rel="noopener" className="hover:text-pink-500 transition-colors"><Icon name="Instagram" size={26} /></a>
                                <button onClick={onOpenCart} className="relative hover:text-gray-900 transition-colors">
                                    <Icon name="ShoppingCart" size={26} />
                                    <span className="absolute -top-2 -right-2 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-black shadow-sm" style={{backgroundColor: data.theme.primaryColor}}>{cartCount}</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <BannerCarousel banners={data.banners} />

                    <main className="container mx-auto px-4 py-20">
                        <div className="flex flex-col items-center mb-16 text-center">
                            <h3 className="text-3xl font-black text-gray-900 uppercase tracking-tighter mb-2">Novidades da Semana</h3>
                            <div className="w-16 h-1 rounded-full" style={{backgroundColor: data.theme.primaryColor}}></div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                            {data.products.map(p => (
                                <div key={p.id} className="group flex flex-col bg-white rounded-[2.5rem] overflow-hidden hover:shadow-2xl transition-all border border-gray-50 p-3">
                                    <div className="relative aspect-square overflow-hidden rounded-[2rem] bg-gray-50 cursor-pointer" onClick={() => onProductClick(p.id)}>
                                        <img src={p.images[0]} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={p.title} />
                                    </div>
                                    <div className="p-5 flex flex-col flex-grow text-center">
                                        <span className="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">{p.category}</span>
                                        <h4 className="text-gray-800 font-bold leading-tight mb-4 flex-grow line-clamp-2 uppercase text-sm">{p.title}</h4>
                                        <div className="text-xl font-black text-gray-900 mb-6">R$ {parseFloat(p.price).toFixed(2).replace('.', ',')}</div>
                                        <button onClick={() => onProductClick(p.id)} className="w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-white shadow-lg hover:opacity-90 transition-all" style={{backgroundColor: data.theme.primaryColor}}>Ver Detalhes</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="bg-gray-950 text-white py-20 text-center px-4 mt-20">
                        <h2 className="text-2xl font-black mb-4 uppercase tracking-widest" style={{ color: data.theme.primaryColor }}>NÃNA PRESENTES</h2>
                        <p className="text-gray-600 text-[10px] font-bold uppercase tracking-widest mb-10">Levando amor em cada detalhe personalizado.</p>
                        <div className="border-t border-white/5 pt-10 text-[9px] text-gray-700 font-black tracking-widest uppercase">© 2026 NÃNA PRESENTES. Todos os direitos reservados.</div>
                    </footer>
                </div>
            );
        }

        function ProductDetail({ product, theme, onBack, onAddToCart }) {
            const [activeImg, setActiveImg] = useState(0);
            const [qty, setQty] = useState(1);
            const [note, setNote] = useState('');
            if (!product) return null;
            return (
                <div className="container mx-auto px-4 py-12 bg-white min-h-screen fade-in">
                    <button onClick={onBack} className="text-[10px] font-black uppercase text-gray-400 mb-12 flex items-center gap-2 hover:text-black transition-colors font-bold"><Icon name="ArrowLeft" size={14}/> Voltar para Loja</button>
                    <div className="flex flex-col lg:flex-row gap-20">
                        <div className="lg:w-1/2">
                            <div className="aspect-square rounded-[3rem] overflow-hidden bg-gray-50 border border-gray-100 mb-6 shadow-2xl">
                                <img src={product.images[activeImg]} className="w-full h-full object-cover" />
                            </div>
                            <div className="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                                {product.images.map((img, idx) => img && (
                                    <button key={idx} onClick={() => setActiveImg(idx)} className={`w-24 h-24 rounded-[1.5rem] overflow-hidden border-4 flex-shrink-0 transition-all ${activeImg === idx ? 'scale-105 shadow-lg' : 'opacity-40 border-transparent'}`} style={{ borderColor: activeImg === idx ? theme.primaryColor : 'transparent' }}>
                                        <img src={img} className="w-full h-full object-cover" />
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="lg:w-1/2">
                            <span className="text-[10px] font-black text-pink-400 uppercase tracking-[0.3em] mb-4 block">{product.category}</span>
                            <h1 className="text-4xl md:text-5xl font-black text-gray-900 mb-6 tracking-tighter uppercase">{product.title}</h1>
                            <div className="text-5xl font-black text-gray-900 mb-12 font-mono">R$ {parseFloat(product.price).toFixed(2).replace('.', ',')}</div>
                            <div className="bg-gray-50 p-10 rounded-[2.5rem] mb-12 border border-gray-100 shadow-inner">
                                <h3 className="font-black text-[10px] text-gray-400 uppercase tracking-widest mb-4">Descrição do Produto</h3>
                                <p className="text-gray-600 leading-relaxed whitespace-pre-line text-sm">{product.description || "Este presente ainda não possui descrição."}</p>
                            </div>
                            <div className="mb-10">
                                <label className="flex items-center gap-2 text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest"><Icon name="MessageCircle" size={16}/> Mensagem de Personalização</label>
                                <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="Ex: Nome, frase ou detalhes que deseja gravar..." className="w-full p-8 bg-gray-50 border-2 border-gray-100 rounded-[2.5rem] outline-none focus:border-pink-300 resize-none h-36 transition-all text-sm" />
                            </div>
                            <div className="flex flex-col sm:flex-row gap-6">
                                <div className="flex items-center bg-gray-50 rounded-[1.5rem] px-8 py-5 border-2 border-gray-100">
                                    <button onClick={() => setQty(Math.max(1, qty-1))} className="p-2 text-gray-400 hover:text-black"><Icon name="Minus" size={24}/></button>
                                    <span className="px-8 font-black text-2xl font-mono">{qty}</span>
                                    <button onClick={() => setQty(qty+1)} className="p-2 text-gray-400 hover:text-black"><Icon name="Plus" size={24}/></button>
                                </div>
                                <button onClick={() => onAddToCart(product, qty, note)} className="flex-1 py-5 rounded-[2rem] text-white font-black uppercase tracking-widest shadow-2xl hover:scale-[1.02] transition-all active:scale-95 text-sm" style={{backgroundColor: theme.primaryColor}}>Adicionar ao Carrinho</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function CartView({ items, theme, onRemove, onContinue }) {
            const [cep, setCep] = useState('');
            const [cepError, setCepError] = useState(false);
            const subtotal = items.reduce((acc, item) => acc + (parseFloat(item.price) * item.qty), 0);
            
            const sendOrder = () => {
                if(!cep || cep.replace(/\D/g, '').length < 8) { setCepError(true); return; }
                let msg = `Olá, gostaria de comprar produtos na NÃNA Presentes.\n\n`;
                items.forEach(i => {
                    msg += `• ${i.qty}x ${i.title}\n`;
                    if (i.note) msg += `   Personalização: "${i.note}"\n`;
                    msg += `   Preço: R$ ${parseFloat(i.price).toFixed(2).replace('.', ',')}\n\n`;
                });
                msg += `CEP: ${cep}\nSegue meu CEP para cálculo do frete.\n\n*Total dos Produtos: R$ ${subtotal.toFixed(2).replace('.', ',')}*`;
                window.open(`https://wa.me/${theme.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="container mx-auto px-4 py-16 max-w-3xl min-h-screen fade-in">
                    <h2 className="text-4xl font-black text-center mb-16 uppercase tracking-tighter">Resumo do Pedido</h2>
                    {items.length === 0 ? (
                        <div className="text-center py-24 bg-white rounded-[3rem] border-2 border-dashed border-gray-100">
                            <Icon name="ShoppingCart" size={64} className="mx-auto text-gray-100 mb-8" />
                            <p className="text-gray-400 font-black uppercase tracking-widest mb-10 text-xs">O carrinho está limpo</p>
                            <button onClick={onContinue} className="px-12 py-5 rounded-2xl text-white font-black text-[10px] uppercase tracking-widest shadow-xl" style={{backgroundColor: theme.primaryColor}}>Voltar às Compras</button>
                        </div>
                    ) : (
                        <div className="space-y-12">
                            <div className="bg-white rounded-[3rem] shadow-2xl border border-gray-50 overflow-hidden">
                                {items.map(i => (
                                    <div key={i.cartId} className="p-10 border-b last:border-0 flex flex-col sm:flex-row items-center gap-10 hover:bg-gray-50 transition-all">
                                        <img src={i.image} className="w-28 h-28 rounded-[2rem] object-cover shadow-xl" />
                                        <div className="flex-1 text-center sm:text-left">
                                            <h4 className="font-black text-gray-800 uppercase text-sm mb-2">{i.title}</h4>
                                            <span className="text-[10px] bg-gray-100 px-4 py-1.5 rounded-full font-black text-gray-400 uppercase tracking-widest inline-block mb-4">Quantidade: {i.qty}</span>
                                            {i.note && <p className="text-[11px] bg-pink-50 p-5 rounded-[1.5rem] text-pink-500 font-bold italic mb-4 border border-pink-100 leading-relaxed">"{i.note}"</p>}
                                            <p className="font-black text-2xl font-mono" style={{color: theme.primaryColor}}>R$ {parseFloat(i.price * i.qty).toFixed(2).replace('.', ',')}</p>
                                        </div>
                                        <button onClick={() => onRemove(i.cartId)} className="p-5 text-gray-200 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all"><Icon name="Trash2" size={32}/></button>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-white p-10 rounded-[3rem] border border-gray-100 shadow-sm">
                                <h3 className="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-6 flex items-center gap-2"><Icon name="MapPin" size={20} /> Destino da Entrega</h3>
                                <input type="text" placeholder="Digite seu CEP postal" value={cep} onChange={(e) => { setCep(e.target.value); setCepError(false); }} className={`w-full p-6 bg-gray-50 border-2 ${cepError ? 'border-red-500 animate-shake' : 'border-gray-100'} rounded-3xl outline-none transition-all text-2xl font-black font-mono focus:border-pink-300`} />
                                {cepError && <p className="text-red-500 text-[10px] font-black uppercase mt-4 tracking-widest animate-pulse text-center">Informe o CEP para o frete</p>}
                            </div>
                            <div className="bg-gray-950 text-white p-12 rounded-[4rem] flex flex-col gap-10 shadow-2xl">
                                <div className="text-center sm:text-left">
                                    <p className="text-gray-500 uppercase text-[10px] font-black tracking-[0.3em] mb-4">Total dos Presentes</p>
                                    <h3 className="text-6xl font-black tracking-tighter font-mono text-white">R$ {subtotal.toFixed(2).replace('.', ',')}</h3>
                                </div>
                                <div className="flex flex-col gap-4">
                                    <button onClick={sendOrder} className="bg-[#25D366] hover:scale-105 text-white py-8 rounded-[2.5rem] font-black text-sm uppercase tracking-widest flex items-center justify-center gap-4 transition-all shadow-xl shadow-green-900/20 active:scale-95">Finalizar no WhatsApp</button>
                                    <button onClick={onContinue} className="text-white py-4 font-black text-[10px] uppercase tracking-[0.4em] opacity-30 hover:opacity-100 transition-all text-center">Continuar Navegando</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- PAINEL ADMINISTRATIVO ---

        function AdminPanel({ data, setData, activeTab, setActiveTab, onSave }) {
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [productForm, setProductForm] = useState({ title: '', price: '', category: 'Canecas', description: '', images: [] });

            const handleFileUpload = (e, type, idx = null) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    if(type === 'logo') setData({ ...data, theme: { ...data.theme, logo: reader.result } });
                    if(type === 'banner') setData({ ...data, banners: [...data.banners, { id: Date.now(), url: reader.result, title: 'Nova Promoção' }].slice(0,5) });
                    if(type === 'product') {
                        const newImgs = [...productForm.images];
                        newImgs[idx] = reader.result;
                        setProductForm({ ...productForm, images: newImgs });
                    }
                };
                reader.readAsDataURL(file);
            };

            const saveProduct = () => {
                if(!productForm.title || !productForm.price) return alert("Preencha o nome e preço");
                
                const newProducts = editingId 
                    ? data.products.map(p => p.id === editingId ? { ...productForm, id: editingId } : p)
                    : [{ ...productForm, id: Date.now() }, ...data.products];
                
                setData({
                    ...data, 
                    products: newProducts
                });
                
                setShowForm(false);
                setEditingId(null);
                setProductForm({ title: '', price: '', category: 'Geral', description: '', images: [] });
            };

            return (
                <div className="container mx-auto px-4 py-12 flex flex-col lg:flex-row gap-12 fade-in">
                    <aside className="lg:w-72">
                        <div className="bg-white rounded-[3rem] shadow-xl p-10 sticky top-24 border border-gray-50 flex flex-col gap-4">
                            <h2 className="text-xl font-black mb-8 uppercase tracking-widest text-center text-gray-800 border-b pb-4">NÃNA ADMIN</h2>
                            <button onClick={() => setActiveTab('theme')} className={`w-full flex items-center gap-3 p-5 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest transition-all ${activeTab === 'theme' ? 'bg-pink-500 text-white shadow-xl scale-105' : 'bg-gray-50 text-gray-400 hover:bg-gray-100'}`}><Icon name="Palette" size={16}/> Visual</button>
                            <button onClick={() => setActiveTab('banners')} className={`w-full flex items-center gap-3 p-5 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest transition-all ${activeTab === 'banners' ? 'bg-pink-500 text-white shadow-xl scale-105' : 'bg-gray-50 text-gray-400 hover:bg-gray-100'}`}><Icon name="ImageIcon" size={16}/> Banners</button>
                            <button onClick={() => setActiveTab('products')} className={`w-full flex items-center gap-3 p-5 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest transition-all ${activeTab === 'products' ? 'bg-pink-500 text-white shadow-xl scale-105' : 'bg-gray-50 text-gray-400 hover:bg-gray-100'}`}><Icon name="Box" size={16}/> Estoque</button>
                            <button onClick={onSave} className="w-full mt-10 p-5 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest bg-green-500 text-white shadow-xl hover:bg-green-600 transition-all flex items-center justify-center gap-3"><Icon name="Save" size={16}/> Salvar na Loja</button>
                        </div>
                    </aside>
                    <main className="flex-1 bg-white p-10 md:p-16 rounded-[4rem] shadow-2xl border border-gray-50 min-h-[700px]">
                        {activeTab === 'theme' && (
                            <div className="space-y-12 animate-in slide-in-from-right-10">
                                <h3 className="text-3xl font-black uppercase tracking-tighter border-b border-gray-100 pb-8 text-gray-800">Identidade da Marca</h3>
                                <div className="flex flex-col gap-10">
                                    <div className="flex flex-col md:flex-row items-center gap-8">
                                        <div className="w-48 h-48 bg-gray-50 border-4 border-dashed rounded-[3rem] flex items-center justify-center overflow-hidden shadow-inner group">
                                            {data.theme.logo ? <img src={data.theme.logo} className="w-full h-full object-contain p-6" /> : <Icon name="Store" className="text-gray-200" size={56} />}
                                        </div>
                                        <div className="flex flex-col gap-4">
                                            <label className="bg-gray-900 text-white px-10 py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest cursor-pointer shadow-xl hover:scale-105 transition-all flex items-center justify-center gap-3 active:scale-95">
                                                <Icon name="Upload" size={16}/> Enviar Logo
                                                <input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(e, 'logo')} />
                                            </label>
                                            {data.theme.logo && (
                                                <button onClick={() => setData({...data, theme: {...data.theme, logo: ''}})} className="bg-red-50 text-red-500 px-10 py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest cursor-pointer shadow-sm hover:bg-red-100 transition-all flex items-center justify-center gap-3 active:scale-95">
                                                    <Icon name="Trash2" size={16}/> Remover Logo
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-12">
                                        <div className="flex flex-col gap-3">
                                            <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-4">Nome da Empresa</label>
                                            <input type="text" value={data.theme.storeName} onChange={(e) => setData({...data, theme: {...data.theme, storeName: e.target.value}})} className="p-6 bg-gray-50 border-2 border-gray-50 rounded-[2rem] font-bold outline-none focus:border-pink-200 transition-all" />
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-4">WhatsApp Oficial</label>
                                            <input type="text" value={data.theme.whatsapp} onChange={(e) => setData({...data, theme: {...data.theme, whatsapp: e.target.value}})} className="p-6 bg-gray-50 border-2 border-gray-50 rounded-[2rem] font-bold outline-none focus:border-pink-200 transition-all" />
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-4">Instagram @</label>
                                            <input type="text" value={data.theme.instagram} onChange={(e) => setData({...data, theme: {...data.theme, instagram: e.target.value}})} className="p-6 bg-gray-50 border-2 border-gray-50 rounded-[2rem] font-bold outline-none focus:border-pink-200 transition-all" />
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-4">Cor da Identidade</label>
                                            <input type="color" value={data.theme.primaryColor} onChange={(e) => setData({...data, theme: {...data.theme, primaryColor: e.target.value}})} className="w-full h-20 rounded-[2rem] cursor-pointer border-none shadow-sm" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'banners' && (
                            <div className="space-y-12 animate-in slide-in-from-right-10">
                                <div className="flex justify-between items-center border-b border-gray-100 pb-8">
                                    <h3 className="text-3xl font-black uppercase tracking-tighter text-gray-800">Banners Carrossel ({data.banners.length}/5)</h3>
                                    <label className={`px-10 py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest cursor-pointer shadow-xl transition-all flex items-center gap-3 ${data.banners.length >= 5 ? 'bg-gray-100 text-gray-300' : 'bg-pink-500 text-white hover:bg-pink-600'}`}>
                                        <Icon name="Plus" size={16}/> Novo Banner
                                        <input type="file" className="hidden" disabled={data.banners.length >= 5} onChange={(e) => handleFileUpload(e, 'banner')} />
                                    </label>
                                </div>
                                <div className="grid gap-10">
                                    {data.banners.map(b => (
                                        <div key={b.id} className="p-8 bg-gray-50 border-2 border-gray-50 rounded-[3rem] flex flex-col md:flex-row items-center gap-10 group hover:border-pink-100 transition-all shadow-sm">
                                            <img src={b.url} className="w-full md:w-64 h-36 rounded-[2rem] object-cover shadow-xl" />
                                            <div className="flex-1 w-full space-y-4">
                                                <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-2">Texto Exibido</label>
                                                <input type="text" value={b.title} onChange={(e) => setData({...data, banners: data.banners.map(ba => ba.id === b.id ? {...ba, title: e.target.value} : ba)})} className="w-full bg-white p-5 rounded-2xl font-black text-sm uppercase outline-none border border-gray-100 focus:border-pink-300 transition-all" />
                                            </div>
                                            <button onClick={() => setData({...data, banners: data.banners.filter(ba => ba.id !== b.id)})} className="p-6 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-[2rem] transition-all"><Icon name="Trash2" size={32}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'products' && (
                            <div className="space-y-12 animate-in slide-in-from-right-10">
                                <div className="flex justify-between items-center border-b border-gray-100 pb-8">
                                    <h3 className="text-3xl font-black uppercase tracking-tighter text-gray-800">Catálogo de Produtos</h3>
                                    {!showForm && <button onClick={() => {setShowForm(true); setEditingId(null); setProductForm({title: '', price: '', category: 'Geral', description: '', images: []})}} className="bg-pink-500 text-white px-10 py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest shadow-xl hover:bg-pink-600 transition-all active:scale-95"><Icon name="Plus" size={14} className="inline mr-2"/> Adicionar Novo</button>}
                                </div>
                                {showForm && (
                                    <div className="p-12 rounded-[3.5rem] border-4 border-dashed border-pink-100 bg-pink-50/20 mb-16 space-y-10 animate-in zoom-in-95 duration-300">
                                        <div className="grid md:grid-cols-2 gap-10">
                                            <div className="space-y-3">
                                                <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-4">Nome do Presente</label>
                                                <input type="text" placeholder="Caneca Mágica..." value={productForm.title} onChange={(e) => setProductForm({...productForm, title: e.target.value})} className="w-full p-6 bg-white border-2 border-gray-50 rounded-[2rem] font-black uppercase text-sm outline-none focus:border-pink-300 shadow-sm" />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-4">Preço Sugerido</label>
                                                <input type="number" placeholder="00.00" value={productForm.price} onChange={(e) => setProductForm({...productForm, price: e.target.value})} className="w-full p-6 bg-white border-2 border-gray-50 rounded-[2rem] font-black text-xl outline-none focus:border-pink-300 shadow-sm" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-6">
                                            {[0,1,2,3].map(i => (
                                                <div key={i} className="aspect-square bg-white border-4 border-dashed border-gray-100 rounded-[2.5rem] flex items-center justify-center overflow-hidden shadow-inner group transition-all hover:border-pink-200">
                                                    {productForm.images[i] ? (
                                                        <div className="relative w-full h-full">
                                                            <img src={productForm.images[i]} className="w-full h-full object-cover" />
                                                            <button onClick={() => { const ni = [...productForm.images]; ni[i] = null; setProductForm({...productForm, images: ni}); }} className="absolute top-3 right-3 bg-red-500 text-white p-1.5 rounded-full shadow-lg"><Icon name="X" size={14}/></button>
                                                        </div>
                                                    ) : (
                                                        <label className="cursor-pointer p-10 text-gray-100 group-hover:text-pink-300 transition-colors flex flex-col items-center gap-3">
                                                            <Icon name="Upload" size={36}/>
                                                            <span className="text-[9px] font-black uppercase tracking-tighter">{i === 0 ? 'CAPA' : 'FOTO'}</span>
                                                            <input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(e, 'product', i)} />
                                                        </label>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest px-4">Descrição e Detalhes</label>
                                            <textarea placeholder="Conte a história desse presente, materiais e prazos..." value={productForm.description} onChange={(e) => setProductForm({...productForm, description: e.target.value})} className="w-full p-10 bg-white border-2 border-gray-50 rounded-[3rem] h-48 resize-none shadow-sm outline-none focus:border-pink-300 font-bold text-gray-500 text-sm leading-relaxed" />
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-6 pt-4">
                                            <button onClick={saveProduct} className="flex-1 py-7 bg-green-500 text-white rounded-[2.5rem] font-black uppercase tracking-widest shadow-2xl hover:scale-105 transition-all text-sm active:scale-95">Salvar Produto</button>
                                            <button onClick={() => { setShowForm(false); setEditingId(null); }} className="px-14 py-7 bg-white border-2 border-gray-100 rounded-[2.5rem] font-black uppercase text-[10px] tracking-widest text-gray-400 hover:text-red-500 transition-all">Descartar</button>
                                        </div>
                                    </div>
                                )}
                                <div className="grid gap-8">
                                    {data.products.map(p => (
                                        <div key={p.id} className="p-8 bg-gray-50 border-2 border-gray-50 rounded-[3rem] flex flex-col sm:flex-row items-center gap-10 group hover:border-pink-100 transition-all shadow-sm">
                                            <img src={p.images[0]} className="w-32 h-32 object-cover rounded-[2rem] shadow-xl" />
                                            <div className="flex-1 text-center sm:text-left">
                                                <h5 className="font-black text-sm uppercase tracking-widest text-gray-800 mb-2">{p.title}</h5>
                                                <p className="text-pink-500 font-black text-xl font-mono">R$ {parseFloat(p.price).toFixed(2).replace('.', ',')}</p>
                                                <span className="text-[9px] font-black text-gray-300 uppercase mt-3 inline-block">Ref: {p.id}</span>
                                            </div>
                                            <div className="flex gap-4">
                                                <button onClick={() => { setEditingId(p.id); setProductForm(p); setShowForm(true); window.scrollTo(0,0); }} className="p-6 bg-white text-gray-300 hover:text-blue-500 hover:bg-blue-50 rounded-full shadow-lg hover:scale-110 transition-all active:scale-95"><Icon name="Settings" size={28}/></button>
                                                <button onClick={() => { if(window.confirm('Tem certeza que deseja excluir este produto?')) setData({...data, products: data.products.filter(pr => pr.id !== p.id)}) }} className="p-6 bg-white text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-full shadow-lg hover:scale-110 transition-all active:scale-95"><Icon name="Trash2" size={28}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {data.products.length === 0 && !showForm && (
                                        <div className="text-center py-32 opacity-20"><Icon name="Box" size={80} className="mx-auto mb-6" /><p className="font-black uppercase tracking-[0.3em] text-sm">Catálogo Vazio</p></div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // Renderização Final
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
